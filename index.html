<!DOCTYPE html>

        body {
            background: rgba(0, 5, 15, 0.9);
            color: #e0f7ff;
            font-family: 'Consolas', monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 🌸 上部固定バナー */
        .system-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 40px;
            background: rgba(0, 105, 217, 0.3);
            border-bottom: 1px solid #00f2fe;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        /* 🌸 セクション区切り */
        .section-title {
            background: #000;
            color: #00f2fe;
            padding: 8px 15px;
            margin: 50px 0 15px 0;
            font-size: 11px;
            font-weight: bold;
            border-left: 4px solid #00f2fe;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* 🌸 写真格納庫（グリッド） */
        .gallery {
            display: grid;
            /* ✨ さらにコンパクトに！80pxから45pxへ魔法をかけました */
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .memory-card {
            border: 1px solid rgba(0, 242, 254, 0.3);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px; /* 極限までコンパクトに */
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            aspect-ratio: 1 / 1; 
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 6px;
        }

        .memory-card:hover {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            transform: scale(1.2); /* 小さい分、ホバー時は少し大胆に大きく */
            z-index: 10;
        }

        .memory-card img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 3px;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #345485; }
    </style>
</head>
