<!DOCTYPE html>

    <style>
        body {
            background: rgba(0, 5, 15, 0.9);
            color: #e0f7ff;
            font-family: 'Consolas', monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 🌸 上部固定バナー */
        .system-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 40px;
            background: rgba(0, 105, 217, 0.3);
            border-bottom: 1px solid #00f2fe;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        /* 🌸 セクション区切り */
        .section-title {
            background: #000;
            color: #00f2fe;
            padding: 10px 20px;
            margin: 60px 0 20px 0;
            font-size: 12px;
            font-weight: bold;
            border-left: 5px solid #00f2fe;
            letter-spacing: 3px;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* 🌸 写真格納庫（グリッド） */
        .gallery {
            display: grid;
            /* ✨ minmaxを150pxから80pxに変更して、半分くらいのサイズに調整 */
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .memory-card {
            border: 1px solid rgba(0, 242, 254, 0.3);
            background: rgba(255, 255, 255, 0.05);
            padding: 5px; /* コンパクトに */
            transition: 0.3s;
            text-decoration: none;
            display: block;
            /* ✨ 正方形を維持するための魔法 */
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .memory-card:hover {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transform: scale(1.1); /* コンパクトなので少し大きめにズーム */
        }

        .memory-card img {
            width: 100%;
            height: 100%;
            /* ✨ 画像を正方形にフィットさせる */
            object-fit: contain; 
            border-radius: 4px;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #345485; }
    </style>
</head>
